<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vinted Label Cropper</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --line: #272b34;
    --text: #e7e9ee;
    --muted: #9aa1ad;
    --accent: #09b1ba;      /* Vinted teal */
    --accent-2: #0a8f96;
    --ok: #3ecf8e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px;
  }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  p.sub { color: var(--muted); margin: 0 0 28px; text-align: center; max-width: 460px; }
  .card {
    width: 100%; max-width: 520px; background: var(--card);
    border: 1px solid var(--line); border-radius: 16px; padding: 28px;
  }
  #drop {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 2px dashed var(--line); border-radius: 12px; padding: 44px 20px; min-height: 200px;
    text-align: center; cursor: pointer; transition: .15s; color: var(--muted);
  }
  #drop.hover { border-color: var(--accent); background: rgba(9,177,186,.06); color: var(--text); }
  #drop strong { color: var(--text); }
  .icon { font-size: 2.4rem; display: block; margin-bottom: 10px; }
  input[type=file] { display: none; }
  #list { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
  .row {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    background: #11141a; border: 1px solid var(--line); border-radius: 10px;
  }
  .row .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: .92rem; }
  .row .status { font-size: .82rem; color: var(--muted); white-space: nowrap; }
  .row .status.ok { color: var(--ok); }
  .row .status.err { color: #ff6b6b; }
  a.dl {
    text-decoration: none; background: var(--accent); color: #042; font-weight: 600;
    padding: 7px 12px; border-radius: 8px; font-size: .82rem; white-space: nowrap;
  }
  a.dl:hover { background: var(--accent-2); }
  .foot { color: var(--muted); font-size: .8rem; margin-top: 22px; text-align: center; }
  .lock { color: var(--ok); }
</style>
</head>
<body>
  <h1>📦 Vinted Label Cropper</h1>
  <p class="sub">Drop your Vinted shipping PDF below (InPost, Evri, and more — the label is found automatically). It’s cropped to the 4×6 label and rotated upright — ready to print. Nothing is uploaded; it all happens in your browser.</p>

  <div class="card">
    <label id="drop" for="file">
      <span class="icon">⬆️</span>
      <strong>Click to choose</strong> or drag PDFs here
    </label>
    <input type="file" id="file" accept="application/pdf,.pdf" multiple />
    <div id="list"></div>
  </div>

  <p class="foot"><span class="lock">🔒</span> 100% local — your label never leaves this device.</p>

<script src="./pdf-lib.min.js"></script>
<script>
const { PDFDocument, PDFName, PDFArray, PDFRawStream, decodePDFRawStream, degrees } = PDFLib;

const PAD = 3;        // margin (pt) so the label's border stroke never clips

// --- Auto-detect the 4x6 label rather than hardcoding one carrier's box. ---
// Vinted/InPost, Evri, etc. all place the label as a form XObject sized ~4x6
// (100x150mm) on an otherwise A4 sheet. We find that XObject's placed rectangle
// and crop to it; the full-page background XObject is rejected by size.

// A 4x6 / A6 label is ~100x150mm: 4x6in = 288x432pt, A6 = 297.6x419.5pt.
// Short side lands ~285-300, long side ~415-435. Reject A4 background & artefacts.
function labelScore(w, h) {
  const lo = Math.min(w, h), hi = Math.max(w, h);
  if (lo > 360 || hi > 520 || lo < 180 || hi < 300) return Infinity;
  const TARGET_LO = 290, TARGET_HI = 426;
  return Math.abs(lo - TARGET_LO) / TARGET_LO + Math.abs(hi - TARGET_HI) / TARGET_HI;
}

function getContentString(page) {
  const ctx = page.node.context;
  let c = page.node.Contents();
  const streams = [];
  if (c instanceof PDFArray) {
    for (let i = 0; i < c.size(); i++) streams.push(ctx.lookup(c.get(i)));
  } else if (c) {
    streams.push(ctx.lookup(c));
  }
  let out = '';
  for (const s of streams) {
    if (s instanceof PDFRawStream) {
      out += new TextDecoder('latin1').decode(decodePDFRawStream(s).decode()) + '\n';
    }
  }
  return out;
}

// Parse the content stream, tracking the CTM through q/Q + cm, and collect the
// page-space rectangle of every placed form XObject. Returns the best 4x6 match.
function findLabelBox(page) {
  const ctx = page.node.context;
  const content = getContentString(page);
  const xobjDict = page.node.Resources()?.lookup(PDFName.of('XObject'));
  const bboxOf = (name) => {
    if (!xobjDict) return null;
    const xo = ctx.lookup(xobjDict.get(PDFName.of(name)));
    const bb = xo?.dict?.lookup(PDFName.of('BBox'));
    if (!bb) return null;
    return [0, 1, 2, 3].map(i => bb.lookup(i).asNumber());
  };

  const mul = (m, n) => [
    m[0]*n[0]+m[2]*n[1], m[1]*n[0]+m[3]*n[1],
    m[0]*n[2]+m[2]*n[3], m[1]*n[2]+m[3]*n[3],
    m[0]*n[4]+m[2]*n[5]+m[4], m[1]*n[4]+m[3]*n[5]+m[5],
  ];
  const apply = (m, x, y) => [m[0]*x+m[2]*y+m[4], m[1]*x+m[3]*y+m[5]];

  const toks = content.split(/\s+/);
  let ctm = [1, 0, 0, 1, 0, 0];
  const stack = [];
  let nums = [], pendingName = null;
  const candidates = [];

  for (const t of toks) {
    if (t === '') continue;
    if (/^[-+]?[0-9.]+$/.test(t)) { nums.push(parseFloat(t)); continue; }
    if (t === 'q') { stack.push(ctm.slice()); nums = []; }
    else if (t === 'Q') { ctm = stack.pop() || [1, 0, 0, 1, 0, 0]; nums = []; }
    else if (t === 'cm' && nums.length >= 6) { ctm = mul(ctm, nums.slice(-6)); nums = []; }
    else if (t[0] === '/') { pendingName = t.slice(1); }
    else if (t === 'Do' && pendingName) {
      const bb = bboxOf(pendingName);
      if (bb) {
        const [x0, y0, x1, y1] = bb;
        const pts = [apply(ctm,x0,y0), apply(ctm,x1,y0), apply(ctm,x1,y1), apply(ctm,x0,y1)];
        const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
        candidates.push({ x0: Math.min(...xs), y0: Math.min(...ys), x1: Math.max(...xs), y1: Math.max(...ys) });
      }
      nums = []; pendingName = null;
    } else { nums = []; }
  }

  let best = null, bestScore = Infinity;
  for (const c of candidates) {
    const s = labelScore(c.x1 - c.x0, c.y1 - c.y0);
    if (s < bestScore) { bestScore = s; best = c; }
  }
  return best;
}

const drop = document.getElementById('drop');
const input = document.getElementById('file');
const list = document.getElementById('list');

['dragenter','dragover'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('hover'); }));
['dragleave','drop'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove('hover'); }));
drop.addEventListener('drop', ev => handleFiles(ev.dataTransfer.files));
input.addEventListener('change', () => handleFiles(input.files));

function handleFiles(files) {
  [...files].filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'))
            .forEach(processFile);
}

function addRow(name) {
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `<span class="name">${name}</span><span class="status">working…</span>`;
  list.appendChild(row);
  return row;
}

async function processFile(file) {
  const row = addRow(file.name);
  const status = row.querySelector('.status');
  try {
    const srcBytes = await file.arrayBuffer();
    const src = await PDFDocument.load(srcBytes);
    const out = await PDFDocument.create();
    const [page] = await out.copyPages(src, [0]);
    out.addPage(page);

    // Auto-detect the 4x6 label on the sheet (carrier-agnostic).
    const box = findLabelBox(page);
    if (!box) throw new Error('no 4x6 label found on page');

    // Clamp the padded crop box to the page bounds.
    const mb = page.getMediaBox();
    const x0 = Math.max(mb.x,             box.x0 - PAD);
    const y0 = Math.max(mb.y,             box.y0 - PAD);
    const x1 = Math.min(mb.x + mb.width,  box.x1 + PAD);
    const y1 = Math.min(mb.y + mb.height, box.y1 + PAD);

    // Stand a landscape label upright; leave a portrait one as-is.
    const rotate = (x1 - x0) > (y1 - y0) ? 270 : 0;

    page.setMediaBox(x0, y0, x1 - x0, y1 - y0);
    page.setCropBox(x0, y0, x1 - x0, y1 - y0);
    page.setRotation(degrees(rotate));

    const outBytes = await out.save();
    const blob = new Blob([outBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const outName = file.name.replace(/\.pdf$/i, '') + '_label.pdf';

    status.textContent = '4×6 ready';
    status.className = 'status ok';
    const a = document.createElement('a');
    a.className = 'dl'; a.href = url; a.download = outName; a.textContent = 'Download';
    row.appendChild(a);
    a.click(); // auto-save
  } catch (err) {
    console.error(err);
    status.textContent = 'failed — no 4×6 label found?';
    status.className = 'status err';
  }
}
</script>
</body>
</html>
